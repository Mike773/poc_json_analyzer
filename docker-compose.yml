services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: poc-json-analyzer-pg
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc
      POSTGRES_DB: poc_metrics
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d poc_metrics"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
